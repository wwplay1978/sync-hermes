name: Sync Hermes Image to Aliyun

on:
  workflow_dispatch: # 允许我们手动点击按钮随时触发同步

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 登录阿里云个人镜像仓库
      run: |
        docker login --username=wwplay@gmail.com -p "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" crpi-g8pfju6vtmetiw0d.cn-shanghai.personal.cr.aliyuncs.com

    - name: 2. 拉取海外原版 Hermes 镜像
      run: |
        docker pull nousresearch/hermes-agent:latest

    - name: 3. 修改标签并推送到阿里云上海仓库
      run: |
        docker tag nousresearch/hermes-agent:latest ://aliyuncs.com
        docker push ://aliyuncs.com
