name: Export Open WebUI Tar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Pull Image via GitHub Network
      run: |
        docker pull ghcr.io/open-webui/open-webui:main

    - name: 2. Save Image to Local File
      run: |
        docker save ghcr.io/open-webui/open-webui:main -o open-webui.tar

    - name: 3. Upload Tar to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: open-webui-offline-package
        path: open-webui.tar
        retention-days: 1 # 文件保留1天，节约空间
